# Final project name
spring.application.name=finalProject

# Database connection settings
spring.datasource.url=jdbc:postgresql://localhost:5433/finalProject_IWA
spring.datasource.username=postgres
spring.datasource.password=postgres

# Hibernate settings to automatically create/update tables based on our domain model
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in the console for debugging purposes
spring.jpa.show-sql=true

# JWT Configuration
# The secret must be at least 256 bits (32 characters) long for HS256 algorithm
finalproject.app.jwtSecret=ThisIsASecretKeyToLongForBeValidToEncodeWithTheAlgorithm123456789!
# Token expiration time in milliseconds (e.g., 86400000 = 24 hours)
finalproject.app.jwtExpirationMs=86400000